 nginx-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
Step 2 — Create Service YAML
  nginx-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001
  type: NodePort
Step 3 — Apply YAML Files
  kubectl
kubectl apply -f nginx-deployment.yaml
kubectl apply -f nginx-service.yaml
 
# Verify
kubectl get deployments
kubectl get pods
kubectl get services
 
# Access via minikube
minikube service nginx-service
